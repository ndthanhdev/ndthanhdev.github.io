# yaml-language-server: $schema: 'https://moonrepo.dev/schemas/project.json'
language: typescript
tags:
  - syncpack
tasks:
  lint:
    preset: utility
    script: $projectRoot/moon-tasks/lint.ts
  test:
    preset: utility
    deps:
      - lint
    script: $projectRoot/moon-tasks/test.ts
  build:
    preset: utility
    script: $projectRoot/moon-tasks/build.ts
  publish:
    preset: utility
    script: $projectRoot/moon-tasks/publish.ts
    # Deploy step: never run during `moon ci` / `moon check` (PR verify and
    # the main check workflow don't provide GH_TOKEN). Release workflows
    # invoke it explicitly via `with-moon-task`, which ignores runInCI.
    options:
      runInCI: false
  collect-workspace-targets:
    preset: utility
    script: $projectRoot/moon-tasks/collect-workspace-targets.ts
  check:
    preset: utility
    deps:
      - ~:syncpack-lint
toolchains:
  default: node
project:
  description: scripts
  title: "@n8v/scripts"
layer: tool
