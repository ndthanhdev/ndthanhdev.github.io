# yaml-language-server: $schema: 'https://moonrepo.dev/schemas/project.json'
language: typescript
tasks:
  dev:
    command: gatsby develop
    inputs:
      - src/**/*
      - content/**/*
      - gatsby-config.ts
      - gatsby-node.ts
    outputs:
      - public
  typecheck:
    command: tsc --noEmit
    inputs:
      - src/**/*
      - content/**/*
      - gatsby-config.ts
      - gatsby-node.ts
  clean:
    command: gatsby clean
  build:
    deps:
      - clean
      - typecheck
    command: gatsby build
    inputs:
      - src/**/*
      - content/**/*
      - gatsby-config.ts
      - gatsby-node.ts
    outputs:
      - public
toolchains:
  default: node
tags:
  - typescript
project:
  description: app
  title: "@n8v/app"
layer: application
